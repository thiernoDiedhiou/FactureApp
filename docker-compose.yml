services:
  postgres:
    image: postgres:16-alpine
    container_name: factureapp-postgres
    environment:
      POSTGRES_DB: factureapp
      POSTGRES_USER: factureapp
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factureapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factureapp-backend
    ports:
      - "5002:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factureapp-frontend
    ports:
      - "3002:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
