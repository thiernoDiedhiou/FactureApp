<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background teal rounded square -->
  <rect width="100" height="100" rx="20" fill="#00C8D7"/>

  <!-- Checkmark (top left) -->
  <polyline
    points="12,33 22,44 38,24"
    stroke="white" stroke-width="7"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Horizontal lines (top area, right of check) -->
  <line x1="46" y1="29" x2="85" y2="29" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="46" y1="40" x2="72" y2="40" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Middle lines (full width) -->
  <line x1="12" y1="56" x2="85" y2="56" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="12" y1="68" x2="68" y2="68" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Franc CFA symbol (bottom) -->
  <text
    x="28" y="92"
    font-family="Arial, sans-serif"
    font-size="22"
    font-weight="bold"
    fill="white"
    text-anchor="middle">f</text>
  <!-- Cross bar on the f -->
  <line x1="18" y1="82" x2="36" y2="82" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
</svg>
